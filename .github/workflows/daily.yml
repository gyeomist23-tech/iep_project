name: Daily News Briefing

on:
  schedule:
    - cron: '30 22 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily news file
        run: python src/news_briefing.py --max-per-section 3 --max-total 12 --lookback-days 28

      - name: Upload generated txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-news-txt
          path: |
            output/**/*.txt
            output/**/*.html
            index.html
          if-no-files-found: warn

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TODAY=$(TZ=Asia/Seoul date +%F)
          git commit -m "chore: daily news ${TODAY}"
          git push
